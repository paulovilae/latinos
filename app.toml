# Latinos-Rust App Manifest

[app]
slug = "latinos-rust"
name = "Latinos Trading"
version = "0.1.0"
description = "Algorithmic trading platform rebuilt in Rust/Loco on the shared OS-v3 platform."
port = 5182

[database]
type = "postgres"
url_env = "LATINOS_RUST_DATABASE_URL"
url = "postgresql://directus:directus_password@localhost:5432/latinos_db"
schema_prefix = "latinos_"

[bot]
name = "LatinosBot"
persona = "latinos"
permissions = ["hera_search", "memento_query"]

[media]
inputs_dir = "var/media/inputs"
outputs_dir = "var/media/outputs"

[development]
start_command = "cargo run -- start -e development"
build_command = "cargo build --release"
