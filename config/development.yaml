# Latinos-Rust Loco Configuration (Development)

# Application logging
logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

# Web server
server:
  port: 5182
  binding: 0.0.0.0
  host: http://localhost
  middlewares:
    cors:
      enable: true
      allow_origins:
        - https://latinos.paulovila.org
        - https://imaginos.ai
        - http://localhost:5182
      allow_headers:
        - any
      allow_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH

# Workers
workers:
  mode: BackgroundAsync

# Database
database:
  uri: {{ get_env(name="DATABASE_URL", default="postgres://imaginos:imaginos_secure_2026@localhost:5432/latinos_db") }}
  enable_logging: false
  connect_timeout: 500
  idle_timeout: 500
  min_connections: 1
  max_connections: 5
  auto_migrate: false
  dangerously_truncate: false
  dangerously_recreate: false

# Auth — JWT secret MUST come from env var LATINOS_JWT_SECRET.
# DO NOT hardcode secrets in config files.
